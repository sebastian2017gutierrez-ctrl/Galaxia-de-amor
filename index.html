<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor - Karimiel</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Interfaz de mensajes superiores */
        #header {
            position: absolute; top: 25px; width: 100%; text-align: center;
            color: #fff; text-shadow: 0 0 15px #ff00ff; z-index: 10;
            pointer-events: none;
        }
        #header h2 { margin: 0; font-size: 20px; letter-spacing: 2px; text-transform: uppercase;}
        #header p { margin: 5px 0 0 0; font-size: 12px; opacity: 0.8; font-style: italic;}

        /* Reproductor estilo Glassmorphism */
        #player {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 360px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); border-radius: 25px; padding: 12px 20px;
            display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100; color: white;
        }
        #play-button {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            border: none; margin-right: 15px; font-size: 18px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; color: #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        .song-info { font-size: 13px; line-height: 1.4; }
        .song-title { font-weight: bold; display: block; color: #ff00ff; }
        
        /* Contenedor invisible para etiquetas de texto masivas */
        #text-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        .orbit-text {
            position: absolute; color: rgba(255, 255, 255, 0.8);
            font-size: 12px; white-space: nowrap; font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <div id="header">
        <h2>TE AMO MUCHOTE MIS OJITOS BRILLANTES ¡MI KARIMIEL! 🌟💛</h2>
        <p>Mueve la galaxia con tu dedo</p>
    </div>

    <div id="player">
        <button id="play-button">▶</button>
        <div class="song-info">
            <span class="song-title">Reina Pepiada - Álvaro Díaz</span>
            <span>0:00 / 3:45 🎵</span>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <div id="text-container"></div>
    <canvas id="canvas"></canvas>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.126.1/build/three.module.js';

        let scene, camera, renderer, particles, heart, textGroup;
        let mouseX = 0, mouseY = 0;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        const textContainer = document.getElementById('text-container');
        const mensajesAmor = [
            "Mi Amor", "Mi Reina 👑", "Mi Karimiel", "Hermosa", "Única ✨", "Mi Cielito", "Mi Todo", 
            "Ojitos Brillantes", "Te Amo", "Mi Luz", "Mi Vida", "Por Siempre", "Mi Sueño", "Mi Tesoro 💖",
            "Perfecta", "Te Adoro", "Mi Mundo", "Te Extraño", "Mi Felicidad", "Mi Sol", "Preciosa"
        ];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 1. Crear Galaxia de Partículas (Estilo Rosado)
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 6000; i++) {
                pos.push((Math.random()-0.5)*25, (Math.random()-0.5)*25, (Math.random()-0.5)*25);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ size: 0.03, color: 0xff00ff, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            // 2. Crear el "Núcleo" (Esfera central blanca)
            const heartGeo = new THREE.SphereGeometry(0.7, 32, 32);
            const heartMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            heart = new THREE.Mesh(heartGeo, heartMat);
            scene.add(heart);

            // 3. Crear Grupo para Mensajes Orbitando
            textGroup = new THREE.Group();
            scene.add(textGroup);

            // Generar muchísimos mensajes
            for (let i = 0; i < 80; i++) {
                createOrbitText(mensajesAmor[Math.floor(Math.random() * mensajesAmor.length)]);
            }

            // Control táctil
            document.addEventListener('touchmove', onTouchMove);
            window.addEventListener('resize', onWindowResize);
            
            // Audio Logic
            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-button');
            btn.addEventListener('click', () => {
                if(audio.paused) { audio.play(); btn.innerHTML = "⏸"; }
                else { audio.pause(); btn.innerHTML = "▶"; }
            });
        }

        function createOrbitText(textStr) {
            // Creamos una esfera invisible para que el texto orbite
            const orbit = new THREE.Object3D();
            orbit.rotation.x = Math.random() * Math.PI * 2;
            orbit.rotation.y = Math.random() * Math.PI * 2;
            orbit.rotation.z = Math.random() * Math.PI * 2;
            textGroup.add(orbit);

            // Creamos la etiqueta HTML del texto
            const textEl = document.createElement('div');
            textEl.className = 'orbit-text';
            textEl.textContent = textStr;
            textEl.style.color = Math.random() > 0.3 ? 'rgba(255, 255, 255, 0.8)' : 'rgba(255, 100, 255, 0.8)'; // Mezclar blanco y rosa
            textContainer.appendChild(textEl);

            // Un punto invisible que sirve de "ancla" para el texto HTML
            const pointGeometry = new THREE.Geometry();
            pointGeometry.vertices.push(new THREE.Vector3(2.5 + Math.random(), 0, 0)); // Radio de órbita
            const pointMaterial = new THREE.PointsMaterial({ size: 0, transparent: true, opacity: 0 });
            const point = new THREE.Points(pointGeometry, pointMaterial);
            orbit.add(point);

            // Guardamos la referencia para actualizar su posición
            orbit.userData = { textElement: textEl, anchorPoint: point, speed: 0.003 + Math.random() * 0.004 };
        }

        function onTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = (e.touches[0].clientX - windowHalfX) * 0.008;
                mouseY = (e.touches[0].clientY - windowHalfY) * 0.008;
            }
        }

        function onWindowResize() {
            windowHalfX = window.innerWidth / 2;
            windowHalfY = window.innerHeight / 2;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            
            // Movimiento 3D interactivo
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            // Actualizar la órbita y posición de cada mensaje
            textGroup.children.forEach(orbit => {
                orbit.rotation.y += orbit.userData.speed;
                
                // Proyectar la posición 3D al canvas 2D
                const vector = new THREE.Vector3();
                orbit.userData.anchorPoint.localToWorld(vector);
                vector.project(camera);

                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (-vector.y * .5 + .5) * window.innerHeight;

                const textElement = orbit.userData.textElement;
                textElement.style.left = `${x}px`;
                textElement.style.top = `${y}px`;
                
                // Efecto de profundidad: ocultar textos detrás de la esfera central
                const depth = vector.z;
                textElement.style.opacity = depth < 0.99 ? 1 : 0.2; // Ocultar si está muy "atrás"
                textElement.style.fontSize = `${12 * (1 - depth * 0.1)}px`; // Más pequeño si está lejos
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
