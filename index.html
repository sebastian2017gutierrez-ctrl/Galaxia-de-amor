<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor - Karimiel (VersiГіn Premium)</title>
    <style>
        /* ESTILOS DE UI - MANTENIDOS EXACTAMENTE IGUAL */
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(110%) brightness(110%) saturate(1.3); }
        
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #header-centered {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.4); backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px; color: white;
            border: 1px solid rgba(255, 0, 255, 0.3); text-align: center;
            box-shadow: 0 0 15px rgba(255,0,255,0.2); pointer-events: auto;
            min-width: 250px;
        }
        #header-centered h1 { margin: 0; font-size: 16px; letter-spacing: 2px; text-transform: uppercase;}
        #header-centered p { margin: 4px 0 0 0; font-size: 11px; color: #ff00ff; }

        #player-centered {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(15, 15, 15, 0.5);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 15px 20px;
            display: flex; align-items: center; border: 1px solid rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.2); pointer-events: auto;
        }
        #play-btn {
            width: 50px; height: 50px; background: linear-gradient(45deg, #ff00ff, #8a2be2);
            border-radius: 50%; border: none; cursor: pointer; color: white;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }
        .song-title-main { font-weight: bold; color: #ff00ff; display: block; font-size: 14px;}
        .song-details-main { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="header-centered">
            <h1>TE AMO MUCHOTE MIS OJITOS BRILLANTES</h1>
            <p>ВЎMI KARIMIEL! рҹ’ӣвңЁ</p>
        </div>

        <div id="player-centered">
            <button id="play-btn">в–¶</button>
            <div style="margin-left: 15px; flex-grow: 1;">
                <span class="song-title-main">Reina Pepiada - ГҒlvaro DГӯaz</span>
                <span class="song-details-main">Reproductor Karimiel Pro рҹҺө 3:45</span>
            </div>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="ГҒlvaro DГӯaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, textGroup, galaxy;
        
        // --- MEJORA 1: MГҒS FRASES Y EMOJIS ---
        const frasesAmor = [
            "Mi Amor вқӨпёҸ", "Mi Reina рҹ‘‘", "Kari Miel рҹҚҜ", "Hermosa вңЁ", "Гҡnica рҹ’Һ", 
            "Mi Todo рҹҢҺ", "Te Amo рҹҳҳ", "Mi Vida рҹ’ҳ", "Ojitos Brillantes вңЁ", "Te Adoro рҹҘ°", 
            "Mi Luz рҹ’Ў", "Mi Mundo рҹҢҢ", "Eterna вҷҫпёҸ", "Mi NiГұa рҹ§ё", "Preciosa рҹҢ№", 
            "Mi Sol вҳҖпёҸ", "Maravillosa рҹҢҲ", "Felicidad рҹҳҠ", "TГә y Yo рҹ‘©вҖҚвқӨпёҸвҖҚрҹ‘Ё", "Mi Paz рҹ•ҠпёҸ"
        ];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0020, 0.08);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            // --- MEJORA 2: ZOOM COMPACTO (LГҚMITES) ---
            controls.minDistance = 7;   // No deja acercarse al nГәcleo
            controls.maxDistance = 22;  // No deja alejarse al vacГӯo
            controls.enablePan = false;

            // --- MEJORA 3: CONSTELACIГ“N CON MГҒS COLOR VIVO ---
            const count = 18000;
            const posArray = new Float32Array(count * 3);
            const colorArray = new Float32Array(count * 3);
            
            // Paleta de colores neГіn: PГәrpura, Cian, Dorado y Blanco
            const palette = [
                new THREE.Color(0x8a2be2), // PГәrpura
                new THREE.Color(0x00ffff), // Cian
                new THREE.Color(0xff00ff), // Magenta
                new THREE.Color(0xffd700), // Dorado
                new THREE.Color(0xffffff)  // Blanco
            ];

            for(let i=0; i < count; i++) {
                let radius = Math.random() * 25;
                let angle = Math.random() * Math.PI * 2;
                
                posArray[i*3] = Math.cos(angle) * radius;
                posArray[i*3+1] = (Math.random() - 0.5) * 1.5; 
                posArray[i*3+2] = Math.sin(angle) * radius;
                
                let mixedColor = palette[Math.floor(Math.random() * palette.length)];
                colorArray[i*3] = mixedColor.r;
                colorArray[i*3+1] = mixedColor.g;
                colorArray[i*3+2] = mixedColor.b;
            }

            const pointsGeo = new THREE.BufferGeometry();
            pointsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            pointsGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            const pointsMat = new THREE.PointsMaterial({
                size: 0.025,
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            galaxy = new THREE.Points(pointsGeo, pointsMat);
            scene.add(galaxy);

            const coreGeo = new THREE.SphereGeometry(1.5, 64, 64);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x050010 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);

            const light = new THREE.PointLight(0xff00ff, 20, 25);
            scene.add(light);

            // --- MEJORA 4: 250 MENSAJES PARA Г“RBITA LLENA ---
            textGroup = new THREE.Group();
            scene.add(textGroup);

            function createTextTexture(text) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 512;
                canvas.height = 128;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 45px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 12;
                ctx.shadowColor = 'rgba(255, 0, 255, 1)';
                ctx.fillText(text, 256, 64);
                return new THREE.CanvasTexture(canvas);
            }

            for(let i=0; i<250; i++) {
                const textTexture = createTextTexture(frasesAmor[Math.floor(Math.random() * frasesAmor.length)]);
                const spriteMat = new THREE.SpriteMaterial({ map: textTexture, transparent: true, blending: THREE.AdditiveBlending });
                const sprite = new THREE.Sprite(spriteMat);
                
                const radius = 4 + Math.random() * 18;
                const angle = Math.random() * Math.PI * 2;
                sprite.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 8, Math.sin(angle) * radius);
                
                sprite.scale.set(3.5, 0.85, 1);
                textGroup.add(sprite);
            }

            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-btn');
            
            btn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    btn.innerHTML = "вҸё";
                } else {
                    audio.pause();
                    btn.innerHTML = "в–¶";
                }
            });

            window.addEventListener('resize', onResize);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            galaxy.rotation.y += 0.0004;
            textGroup.rotation.y += 0.001; 
            
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
