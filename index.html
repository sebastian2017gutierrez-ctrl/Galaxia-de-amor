<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor - Karimiel (Clon Final)</title>
    <style>
        /* ESTILOS DE UI - FIJOS Y CENTRADOS A LA PANTALLA (Inmunes al Zoom) */
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; filter: contrast(120%) brightness(110%); }
        
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* Encabezado: Centrado arriba, estilo burbuja */
        #header-centered {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 15, 0.4); backdrop-filter: blur(15px);
            padding: 12px 30px; border-radius: 50px; color: white;
            border: 1px solid rgba(255, 0, 255, 0.3); text-align: center;
            box-shadow: 0 0 15px rgba(255,0,255,0.2); pointer-events: auto;
            min-width: 250px;
        }
        #header-centered h1 { margin: 0; font-size: 16px; letter-spacing: 2px; text-transform: uppercase;}
        #header-centered p { margin: 4px 0 0 0; font-size: 11px; color: #ff00ff; }

        /* Reproductor: Centrado abajo, estilo burbuja */
        #player-centered {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(15, 15, 15, 0.5);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 15px 20px;
            display: flex; align-items: center; border: 1px solid rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.2); pointer-events: auto;
        }
        #play-btn {
            width: 50px; height: 50px; background: linear-gradient(45deg, #ff00ff, #8a2be2);
            border-radius: 50%; border: none; cursor: pointer; color: white;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.6);
        }
        .song-title-main { font-weight: bold; color: #ff00ff; display: block; font-size: 14px;}
        .song-details-main { font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="header-centered">
            <h1>TE AMO MUCHOTE MIS OJITOS BRILLANTES</h1>
            <p>¡MI KARIMIEL! 💛✨</p>
        </div>

        <div id="player-centered">
            <button id="play-btn">▶</button>
            <div style="margin-left: 15px; flex-grow: 1;">
                <span class="song-title-main">Reina Pepiada - Álvaro Díaz</span>
                <span class="song-details-main">Reproductor Karimiel Pro 🎵 3:45</span>
            </div>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, textGroup, galaxy;
        const frasesAmor = ["Mi Amor", "Mi Reina 👑", "Kari Miel", "Hermosa", "Única", "Mi Todo", "Te Amo", "Mi Vida", "Ojitos Brillantes", "Te Adoro", "Mi Luz", "Mundo", "Eterna💖", "Mi Niña", "Mi Sueño", "Preciosa", "Mi Sol", "Maravillosa", "Te Extraño", "Mi Felicidad"];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            // Paleta de colores idéntica (Púrpura/Azul profundo con niebla neón)
            scene.fog = new THREE.FogExp2(0x0a0020, 0.1);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 12);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // CONTROLES DE ÓRBITA (Habilitados para Zoom/Rotación de mensajes, pero el UI queda fijo)
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Rotación suave
            controls.enableZoom = true;    // Permite zoom de mensajes
            controls.enablePan = false;    // Evita arrastrar la galaxia fuera de vista

            // --- GALAXIA DE PARTÍCULAS MASIVA ---
            const count = 15000;
            const posArray = new Float32Array(count * 3);
            const colorArray = new Float32Array(count * 3);

            for(let i=0; i < count * 3; i++) {
                // Distribución en disco plano para clonar la órbita del link
                let radius = Math.random() * 20;
                let angle = Math.random() * Math.PI * 2;
                if (i % 3 === 0) posArray[i] = Math.cos(angle) * radius; // x
                if (i % 3 === 1) posArray[i] = (Math.random() - 0.5) * 1.5; // y (plano)
                if (i % 3 === 2) posArray[i] = Math.sin(angle) * radius; // z
                
                // Variación de color neón (Púrpura y Blanco)
                colorArray[i] = Math.random() > 0.8 ? 1.0 : 0.8; // R
                colorArray[i+1] = Math.random() > 0.6 ? 1.0 : 0.0; // G
                colorArray[i+2] = Math.random() > 0.8 ? 1.0 : 1.0; // B
            }

            const pointsGeo = new THREE.BufferGeometry();
            pointsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            pointsGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            const pointsMat = new THREE.PointsMaterial({
                size: 0.02,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending, // Efecto neón al superponerse
                depthWrite: false
            });

            galaxy = new THREE.Points(pointsGeo, pointsMat);
            scene.add(galaxy);

            // --- NÚCLEO CENTRAL (Esfera Púrpura/Azul Brilhante) ---
            const coreGeo = new THREE.SphereGeometry(1.5, 64, 64);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0x4b0082 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);

            // Glow central
            const light = new THREE.PointLight(0xff00ff, 20, 25);
            light.position.set(0,0,0);
            scene.add(light);

            // --- MENSAJES FLOTANTES MASIVOS ---
            textGroup = new THREE.Group();
            scene.add(textGroup);

            // Función para crear texturas de texto nítidas para Sprites 3D
            function createTextTexture(text) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 512;
                canvas.height = 128;
                ctx.fillStyle = 'rgba(255, 255, 255, 1)';
                ctx.font = 'bold 50px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // Añadir glow de neón a las letras
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 0, 255, 1)';
                ctx.fillText(text, 256, 64);
                return new THREE.CanvasTexture(canvas);
            }

            // Generar 100 mensajes orbitando para copiar la densidad del original
            for(let i=0; i<100; i++) {
                const textTexture = createTextTexture(frasesAmor[Math.floor(Math.random() * frasesAmor.length)]);
                const spriteMat = new THREE.SpriteMaterial({ map: textTexture, transparent: true, blending: THREE.AdditiveBlending });
                const sprite = new THREE.Sprite(spriteMat);
                
                // Posicionamiento en órbita
                const radius = 3 + Math.random() * 12;
                const angle = (i / 100) * Math.PI * 2;
                sprite.position.set(Math.cos(angle) * radius, (Math.random() - 0.5) * 5, Math.sin(angle) * radius);
                
                // Escala para perspectiva
                sprite.scale.set(3, 0.75, 1);
                
                textGroup.add(sprite);
            }

            // --- LÓGICA DE AUDIO (Blindada) ---
            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-btn');
            
            btn.addEventListener('click', () => {
                if (audio.paused) {
                    audio.play();
                    btn.innerHTML = "⏸";
                } else {
                    audio.pause();
                    btn.innerHTML = "▶";
                }
            });

            window.addEventListener('resize', onResize);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            galaxy.rotation.y += 0.0005; // Rotación de partículas
            textGroup.rotation.y += 0.002; // Rotación de mensajes
            
            controls.update(); // Actualizar Órbita Táctil
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
  </html>
