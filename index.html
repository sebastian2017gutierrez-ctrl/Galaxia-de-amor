<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Karimiel - Versión Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* UI CENTRADA - NO SE MUEVE CON EL ZOOM */
        #header-centered {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 0, 35, 0.5); backdrop-filter: blur(10px);
            padding: 12px 30px; border-radius: 50px; color: white;
            border: 1px solid rgba(255, 0, 255, 0.4); text-align: center;
            box-shadow: 0 0 20px rgba(255,0,255,0.2); pointer-events: auto;
            min-width: 280px;
        }
        #header-centered h1 { margin: 0; font-size: 15px; letter-spacing: 1px; }
        #header-centered p { margin: 4px 0 0 0; font-size: 11px; color: #ff00ff; font-weight: bold; }

        #player-centered {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(15px); border-radius: 25px; padding: 15px;
            display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.3);
            pointer-events: auto;
        }
        #play-btn {
            width: 45px; height: 45px; background: #ff00ff; border-radius: 50%;
            border: none; cursor: pointer; color: white; font-size: 18px;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }
        .info { margin-left: 15px; color: white; }
        .info b { color: #ff00ff; font-size: 14px; display: block; }
        .info span { font-size: 11px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="header-centered">
            <h1>TE AMO MUCHOTE MIS OJITOS BRILLANTES</h1>
            <p>💖 ¡MI KARIMIEL! ✨🌟</p>
        </div>

        <div id="player-centered">
            <button id="play-btn">▶</button>
            <div class="info">
                <b>Reina Pepiada - Álvaro Díaz</b>
                <span>Reproductor de Amor ✨ 3:45</span>
            </div>
        </div>
    </div>

    <audio id="musica" loop src="Álvaro Díaz - Reina Pepiada - AMV.mp3"></audio>

    <script>
        let scene, camera, renderer, controls, textGroup, galaxy;
        const frasesAmor = ["Mi Amor ❤️", "Mi Reina 👑", "Kari Miel 🍯", "Hermosa ✨", "Única 💎", "Mi Todo 🌎", "Te Amo 😘", "Mi Vida 💘", "Ojitos Brillantes ✨", "Te Adoro 🥰", "Mi Luz 💡", "Mi Mundo 🌌", "Eterna ♾️", "Mi Niña 🧸", "Preciosa 🌹", "Mi Sol ☀️", "Maravillosa 🌈", "Tú y Yo 👩‍❤️‍👨", "Mi Paz 🕊️", "Perfecta 🥇"];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050010, 0.08);

            camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- MEJORA: ZOOM COMPACTO (Limitado) ---
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 7;   // Límite de cercanía
            controls.maxDistance = 20;  // Límite de alejamiento
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.6;

            // --- MEJORA: CONSTELACIÓN CON MÁS COLOR ---
            const count = 15000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const colorPalette = [new THREE.Color(0xff00ff), new THREE.Color(0x00ffff), new THREE.Color(0xffffff), new THREE.Color(0xffd700)];

            for(let i=0; i < count; i++) {
                let r = Math.random() * 22;
                let a = Math.random() * Math.PI * 2;
                positions[i*3] = Math.cos(a) * r;
                positions[i*3+1] = (Math.random() - 0.5) * 1.5;
                positions[i*3+2] = Math.sin(a) * r;
                
                let col = colorPalette[Math.floor(Math.random() * colorPalette.length)];
                colors[i*3] = col.r; colors[i*3+1] = col.g; colors[i*3+2] = col.b;
            }

            const starGeo = new THREE.BufferGeometry();
            starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            galaxy = new THREE.Points(starGeo, new THREE.PointsMaterial({
                size: 0.03, vertexColors: true, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
            }));
            scene.add(galaxy);

            // Núcleo
            scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0x0a001a })));

            // --- MEJORA: 250 MENSAJES CON EMOJIS ---
            textGroup = new THREE.Group();
            scene.add(textGroup);

            function createLabel(text) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 400; canvas.height = 100;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 35px Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 10; ctx.shadowColor = '#ff00ff';
                ctx.fillText(text, 200, 60);
                const tex = new THREE.CanvasTexture(canvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, blending: THREE.AdditiveBlending }));
                sprite.scale.set(3, 0.75, 1);
                return sprite;
            }

            for(let i=0; i<250; i++) {
                const s = createLabel(frasesAmor[Math.floor(Math.random()*frasesAmor.length)]);
                const r = 4 + Math.random() * 15;
                const a = Math.random() * Math.PI * 2;
                s.position.set(Math.cos(a)*r, (Math.random()-0.5)*10, Math.sin(a)*r);
                textGroup.add(s);
            }

            // Audio
            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-btn');
            btn.onclick = () => {
                if (audio.paused) { audio.play(); btn.innerHTML = "⏸"; }
                else { audio.pause(); btn.innerHTML = "▶"; }
            };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            galaxy.rotation.y += 0.0004;
            textGroup.rotation.y -= 0.0007;
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
