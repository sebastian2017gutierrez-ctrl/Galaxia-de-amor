<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Galaxia Karimiel 💛</title>
  <style>
    html,body{margin:0;height:100%;background:#000;overflow:hidden}
    #galaxy-canvas{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}
    
    /* UI CENTRADA Y ESTILIZADA - IDENTICA AL DISEÑO PREFERIDO */
    .pill {
      position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
      padding: 10px 25px; border-radius: 999px;
      background: rgba(20, 0, 40, 0.5); border: 1px solid rgba(255, 0, 255, 0.4);
      color: #fff; font: bold 14px Arial; backdrop-filter: blur(10px);
      z-index: 20; box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
      text-align: center; min-width: 250px;
    }

    .player {
      position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 15px; align-items: center; width: 85%; max-width: 380px;
      background: rgba(10, 10, 20, 0.6); border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 25px; padding: 12px 20px;
      backdrop-filter: blur(15px); color: #fff; font-family: Arial;
      z-index: 20; box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
    }

    .player button {
      width: 45px; height: 45px; border-radius: 50%; border: none;
      background: linear-gradient(45deg, #ff00ff, #00ffff); color: #fff;
      font-size: 18px; cursor: pointer; box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
    }

    .song-info { display: flex; flex-direction: column; }
    .song-title { font-weight: bold; color: #ff00ff; font-size: 13px; }
    .song-sub { font-size: 10px; opacity: 0.8; color: #00ffff; }

    .attribution { position: fixed; left: 10px; bottom: 5px; font-size: 9px; color: #fff; opacity: 0.3; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
<canvas id="galaxy-canvas"></canvas>

<div class="pill">Te Amo Muchote Mis Ojitos Brillantes 💛</div>

<div class="player">
  <button id="playBtn">▶</button>
  <div class="song-info">
    <span class="song-title">Reina Pepiada - Álvaro Díaz</span>
    <span Kari, me debes un millón de besos 💚</span>
  </div>
  <audio id="audio" loop>
    <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="attribution">Base: tlanex · Adaptación Karimiel 💫</div>
<canvas id="fx" style="position:fixed;inset:0;pointer-events:none;z-index:15;"></canvas>

<script>
(function(){
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');

playBtn.onclick = () => {
  if (audio.paused) { audio.play(); playBtn.textContent='⏸'; }
  else { audio.pause(); playBtn.textContent='▶'; }
};

// ====== THREE.JS GALAXY ======
const canvas = document.getElementById('galaxy-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
const controls = new THREE.OrbitControls(camera, renderer.domElement);

// --- MEJORA: ZOOM COMPACTO LIMITADO ---
controls.enableDamping = true;
controls.minDistance = 20;  
controls.maxDistance = 150; 
controls.enablePan = false;

camera.position.set(0, 40, 100);

// Estrellas de fondo
const bgGeo = new THREE.SphereGeometry(800, 64, 64);
const bgMat = new THREE.MeshBasicMaterial({ color: 0x050010, side: THREE.BackSide });
scene.add(new THREE.Mesh(bgGeo, bgMat));

const galaxy = new THREE.Group(); scene.add(galaxy);

// --- MEJORA: MENSAJES CON EMOJIS Y COLOR ---
const phrases = ["Preciosa ✨", "Hermosa 💚", "Mi Bebe 🧸", "Mi Cielito 🌌", "Solecito ☀️", "Mi niña 👧", "Mi Todo 🌎", "Me Encantas 🥰", "Te Quiero 💚", "Única 😊", "Mi Reina 👑", "Mi Amor ❤️", "Mi Mundo 🪐", "Mi Luz 🌠", "Mi Tesoro 💎", "Eres Arte 🎨", "Mi Vida 💘", "Infinito ♾️"];
const phraseCount = 200;
const radius = 90;

function makeTextTexture(text){
  const c=document.createElement('canvas'); c.width=512; c.height=128;
  const g=c.getContext('2d');
  g.font='bold 40px Arial';
  g.textAlign='center'; g.textBaseline='middle';
  g.shadowColor='#ff00ff'; g.shadowBlur=15;
  g.fillStyle='#ffffff'; g.fillText(text,256,64);
  return new THREE.CanvasTexture(c);
}

for(let i=0; i<phraseCount; i++){
  const tex = makeTextTexture(phrases[i % phrases.length]);
  const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map:tex, transparent:true, blending: THREE.AdditiveBlending }));
  const ang = Math.random() * Math.PI * 2;
  const dist = Math.pow(Math.random(), 0.5) * radius;
  spr.position.set(Math.cos(ang)*dist, (Math.random()-0.5)*15, Math.sin(ang)*dist);
  spr.scale.set(18, 4.5, 1);
  galaxy.add(spr);
}

// Estrellas de la constelación (Más color)
const starCount=9000, geom=new THREE.BufferGeometry(), pos=new Float32Array(starCount*3), cols=new Float32Array(starCount*3);
const pCol = [new THREE.Color(0xff00ff), new THREE.Color(0x00ffff), new THREE.Color(0xffffff)];

for(let i=0; i<starCount; i++){
  const ang=Math.random()*Math.PI*2, dist=Math.random()*radius*1.2;
  pos[i*3]=Math.cos(ang)*dist; pos[i*3+1]=(Math.random()-0.5)*20; pos[i*3+2]=Math.sin(ang)*dist;
  const c = pCol[Math.floor(Math.random()*pCol.length)];
  cols[i*3]=c.r; cols[i*3+1]=c.g; cols[i*3+2]=c.b;
}
geom.setAttribute('position', new THREE.BufferAttribute(pos,3));
geom.setAttribute('color', new THREE.BufferAttribute(cols,3));
galaxy.add(new THREE.Points(geom, new THREE.PointsMaterial({ size:0.25, vertexColors:true, transparent:true, opacity:0.8, blending:THREE.AdditiveBlending })));

// Núcleo Agujero Negro
const core = new THREE.Mesh(new THREE.SphereGeometry(14,32,32), new THREE.MeshBasicMaterial({ color: 0x000000 }));
scene.add(core);

const ring = new THREE.Mesh(new THREE.RingGeometry(15, 18, 64), new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide, transparent:true, opacity:0.7 }));
ring.rotation.x = Math.PI/2;
scene.add(ring);

function animate(){
  requestAnimationFrame(animate);
  const t = performance.now()*0.0005;
  galaxy.rotation.y = t * 0.1;
  ring.rotation.z = t * 0.5;
  controls.update();
  renderer.render(scene, camera);
} animate();

// ====== CORAZONES AL CLIC ======
const fx = document.getElementById('fx');
const ctx2 = fx.getContext('2d');
const hearts = [];
function resize(){ fx.width=innerWidth; fx.height=innerHeight; }
addEventListener('resize', resize); resize();

function spawnHearts(x,y){
  for(let i=0;i<15;i++){
    hearts.push({x,y,vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, size:Math.random()*15+10, life:1});
  }
}
addEventListener('mousedown', (e)=>spawnHearts(e.clientX, e.clientY));

function loopFx(){
  ctx2.clearRect(0,0,fx.width,fx.height);
  for(let i=hearts.length-1; i>=0; i--){
    const h=hearts[i]; h.x+=h.vx; h.y+=h.vy; h.life-=0.02;
    ctx2.globalAlpha=h.life;
    ctx2.font=h.size+'px Arial'; ctx2.fillText('❤️', h.x, h.y);
    if(h.life<=0) hearts.splice(i,1);
  }
  requestAnimationFrame(loopFx);
} loopFx();
})();
</script>
</body>
</html>
