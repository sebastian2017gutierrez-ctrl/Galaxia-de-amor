<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        
        #interfaz {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        #play-btn {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .mensaje-top {
            position: absolute;
            top: 30px;
            width: 100%;
            text-align: center;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="mensaje-top">Te Amo Muchote Mis Ojitos Brillantes ¡Mi Kari miel! 🌟💛</div>

    <canvas id="canvas"></canvas>

    <div id="interfaz">
        <button id="play-btn">▶</button>
        <div>
            <div style="font-size: 14px;">Reproduciendo:</div>
            <div style="font-weight: bold;">Álvaro Díaz - Reina Pepiada</div>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('musica');
        const btn = document.getElementById('play-btn');

        let particles = [];
        const mensajes = ["Mi Amor", "Mi Reina 👑", "Mi Todo", "Hermosa", "Única ✨", "Mi Cielito"];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5 + 0.2;
                this.text = Math.random() > 0.9 ? mensajes[Math.floor(Math.random() * mensajes.length)] : null;
            }
            draw() {
                ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                if (this.text) {
                    ctx.font = "12px sans-serif";
                    ctx.fillText(this.text, this.x + 5, this.y);
                }

                this.y -= this.speed;
                if (this.y < -20) this.reset();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < 150; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = "rgba(10, 0, 30, 0.3)"; // Fondo morado oscuro como la foto
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Dibujar "Planeta" central
            const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2.5, 0, canvas.width/2, canvas.height/2.5, 80);
            gradient.addColorStop(0, "#4b0082");
            gradient.addColorStop(1, "#000");
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(canvas.width/2, canvas.height/2.5, 70, 0, Math.PI * 2);
            ctx.fill();

            particles.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }

        btn.onclick = () => {
            if (audio.paused) {
                audio.play();
                btn.innerText = "⏸";
            } else {
                audio.pause();
                btn.innerText = "▶";
            }
        };

        window.addEventListener('resize', resize);
        init();
        animate();
    </script>
</body>
</html>
