<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia 3D - Mis Ojitos Brillantes</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        
        /* Interfaz superior */
        #header {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 10;
        }

        /* Reproductor estilo la imagen que pasaste */
        #player {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            z-index: 10;
            color: white;
        }

        #play-button {
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            border: none;
            margin-right: 15px;
            font-size: 20px;
            cursor: pointer;
        }

        .song-info { font-size: 13px; }
        .song-title { font-weight: bold; display: block; }
    </style>
</head>
<body>

    <div id="header">
        <h2 style="margin:0; font-size: 18px;">Te Amo Muchote Mis Ojitos Brillantes ¡Mi Karimiel! 🌟💛</h2>
        <p style="font-size: 10px; opacity: 0.7;">Toca y arrastra para explorar | Usa dos dedos para zoom</p>
    </div>

    <div id="player">
        <button id="play-button">▶</button>
        <div class="song-info">
            <span class="song-title">Álvaro Díaz - Reina Pepiada</span>
            <span>Reproductor de Amor ✨</span>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Configuración básica
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles de movimiento (Zoom y Rotación)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        camera.position.z = 5;

        // Crear Estrellas
        const starGeometry = new THREE.BufferGeometry();
        const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
        const starVertices = [];
        for (let i = 0; i < 5000; i++) {
            const x = (Math.random() - 0.5) * 100;
            const y = (Math.random() - 0.5) * 100;
            const z = (Math.random() - 0.5) * 100;
            starVertices.push(x, y, z);
        }
        starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
        const stars = THREE.Points(starGeometry, starMaterial);
        scene.add(stars);

        // Planeta Central (Esfera Morada)
        const globeGeo = new THREE.SphereGeometry(1, 32, 32);
        const globeMat = new THREE.MeshPhongMaterial({
            color: 0x4b0082,
            emissive: 0x220033,
            shininess: 100
        });
        const globe = new THREE.Mesh(globeGeo, globeMat);
        scene.add(globe);

        // Luz para que brille el planeta
        const light = new THREE.PointLight(0xffffff, 50, 100);
        light.position.set(2, 2, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Mensajes Orbitando
        const textos = ["Mi Amor", "Mi Reina 👑", "Hermosa", "Mi Cielito", "Única ✨", "Mi Todo", "Mi Karimiel"];
        const textGroup = new THREE.Group();
        
        function createTextCanvas(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            ctx.fillStyle = 'white';
            ctx.font = 'Bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 45);
            return canvas;
        }

        textos.forEach((t, i) => {
            const texture = new THREE.CanvasTexture(createTextCanvas(t));
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            
            // Posición aleatoria en órbita
            const angle = (i / textos.length) * Math.PI * 2;
            const radius = 2 + Math.random() * 2;
            sprite.position.set(Math.cos(angle) * radius, (Math.random()-0.5) * 2, Math.sin(angle) * radius);
            sprite.scale.set(1.5, 0.4, 1);
            textGroup.add(sprite);
        });
        scene.add(textGroup);

        // Lógica de Audio
        const audio = document.getElementById('musica');
        const playBtn = document.getElementById('play-button');
        
        playBtn.onclick = () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerText = "⏸";
            } else {
                audio.pause();
                playBtn.innerText = "▶";
            }
        };

        // Animación
        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0005;
            textGroup.rotation.y += 0.005; // Rotación de los mensajes
            globe.rotation.y += 0.01;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
      </html>
