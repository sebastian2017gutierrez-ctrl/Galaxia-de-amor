<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Karimiel - Ultra Edition</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; filter: saturate(1.4) brightness(1.1); }
        
        #ui-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        /* UI Centrada y Fija */
        #header-centered {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 0, 30, 0.6); backdrop-filter: blur(15px);
            padding: 12px 35px; border-radius: 50px; color: white;
            border: 1px solid rgba(255, 0, 255, 0.4); text-align: center;
            box-shadow: 0 0 20px rgba(255,0,255,0.3); pointer-events: auto;
            min-width: 280px;
        }
        #header-centered h1 { margin: 0; font-size: 15px; letter-spacing: 2px; font-weight: 800; }
        #header-centered p { margin: 4px 0 0 0; font-size: 11px; color: #ff00ff; font-weight: bold; }

        #player-centered {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(20px); border-radius: 30px; padding: 15px 25px;
            display: flex; align-items: center; border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.2); pointer-events: auto;
        }
        #play-btn {
            width: 50px; height: 50px; background: linear-gradient(135deg, #ff00ff, #00ffff);
            border-radius: 50%; border: none; cursor: pointer; color: white;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5); transition: 0.3s;
        }
        #play-btn:active { transform: scale(0.9); }
        .song-info { margin-left: 18px; }
        .song-title { font-weight: bold; color: #fff; display: block; font-size: 14px; text-shadow: 0 0 5px #ff00ff; }
        .song-sub { font-size: 11px; color: #00ffff; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div id="header-centered">
            <h1>TE AMO MUCHOTE MIS OJITOS BRILLANTES</h1>
            <p>💖 ¡MI KARIMIEL! ✨🌟</p>
        </div>

        <div id="player-centered">
            <button id="play-btn">▶</button>
            <div class="song-info">
                <span class="song-title">Reina Pepiada • Álvaro Díaz</span>
                <span class="song-sub">Sintonizando tu amor... 🎵</span>
            </div>
        </div>
    </div>

    <audio id="musica" loop src="Álvaro Díaz - Reina Pepiada - AMV.mp3"></audio>

    <script type="importmap">

    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let scene, camera, renderer, controls, textGroup, galaxy;
        
        // Mensajes con Emojis (Más variedad)
        const frasesAmor = [
            "Mi Amor ❤️", "Mi Reina 👑", "Kari Miel 🍯", "Hermosa ✨", "Única 💎", 
            "Mi Todo 🌎", "Te Amo 😘", "Mi Vida 💘", "Ojitos Brillantes ✨", "Te Adoro 🥰", 
            "Mi Luz 💡", "Mi Mundo 🌌", "Eterna ♾️", "Mi Niña 🧸", "Mi Sueño 💤", 
            "Preciosa 🌹", "Mi Sol ☀️", "Maravillosa 🌈", "Te Extraño 🥺", "Felicidad 😊",
            "Para Siempre 💍", "Mi Tesoro 💰", "Tú y Yo 👩‍❤️‍👨", "Mi Paz 🕊️", "Perfecta 🥇"
        ];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050010, 0.07);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // --- ZOOM COMPACTO Y LIMITADO ---
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.minDistance = 6;   // No deja acercarse demasiado
            controls.maxDistance = 22;  // No deja alejarse al infinito
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.5;

            // --- GALAXIA MULTICOLOR ---
            const count = 18000;
            const posArray = new Float32Array(count * 3);
            const colorArray = new Float32Array(count * 3);
            const colors = [new THREE.Color(0xff00ff), new THREE.Color(0x00ffff), new THREE.Color(0xffffff), new THREE.Color(0xffd700)];

            for(let i=0; i < count; i++) {
                let radius = Math.random() * 25;
                let angle = Math.random() * Math.PI * 2;
                
                posArray[i*3] = Math.cos(angle) * radius;
                posArray[i*3+1] = (Math.random() - 0.5) * (Math.random() * 2);
                posArray[i*3+2] = Math.sin(angle) * radius;
                
                let chosenColor = colors[Math.floor(Math.random() * colors.length)];
                colorArray[i*3] = chosenColor.r;
                colorArray[i*3+1] = chosenColor.g;
                colorArray[i*3+2] = chosenColor.b;
            }

            const pointsGeo = new THREE.BufferGeometry();
            pointsGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            pointsGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

            galaxy = new THREE.Points(pointsGeo, new THREE.PointsMaterial({
                size: 0.025, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending
            }));
            scene.add(galaxy);

            // Núcleo
            const core = new THREE.Mesh(
                new THREE.SphereGeometry(1.8, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x1a0033 })
            );
            scene.add(core);

            // --- MENSAJES (250 Unidades) ---
            textGroup = new THREE.Group();
            scene.add(textGroup);

            function createTextTexture(text) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 512; canvas.height = 128;
                ctx.fillStyle = 'white';
                ctx.font = 'bold 44px Arial';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff00ff';
                ctx.fillText(text, 256, 70);
                return new THREE.CanvasTexture(canvas);
            }

                const sprite = new THREE.Sprite(new THREE.Sprite
