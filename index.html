<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia de Amor - Mis Ojitos Brillantes</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        canvas { display: block; }
        
        /* Interfaz de mensajes */
        #header {
            position: absolute; top: 25px; width: 100%; text-align: center;
            color: #fff; text-shadow: 0 0 15px #ff00ff; z-index: 10;
            pointer-events: none;
        }
        #header h2 { margin: 0; font-size: 20px; letter-spacing: 2px; }

        /* Reproductor estilo "Glassmorphism" */
        #player {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 360px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px); border-radius: 25px; padding: 12px 20px;
            display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100; color: white;
        }
        #play-button {
            width: 45px; height: 45px; background: #fff; border-radius: 50%;
            border: none; margin-right: 15px; font-size: 18px; cursor: pointer;
            display: flex; justify-content: center; align-items: center; color: #000;
            box-shadow: 0 0 15px rgba(255,255,255,0.4);
        }
        .song-info { font-size: 13px; line-height: 1.4; }
        .song-title { font-weight: bold; display: block; color: #ff00ff; }
    </style>
</head>
<body>

    <div id="header">
        <h2>TE AMO MUCHOTE MIS OJITOS BRILLANTES ¡MI KARI MIEL! 🌟</h2>
        <p style="font-size: 12px; margin-top: 5px;">Mueve la galaxia con tu dedo</p>
    </div>

    <div id="player">
        <button id="play-button">▶</button>
        <div class="song-info">
            <span class="song-title">Reina Pepiada - Álvaro Díaz</span>
            <span>0:00 / 3:45 🎵</span>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.126.1/build/three.module.js';

        let scene, camera, renderer, particles, heart;
        let mouseX = 0, mouseY = 0;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Crear Galaxia de Partículas
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for (let i = 0; i < 4000; i++) {
                pos.push((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            const mat = new THREE.PointsMaterial({ size: 0.03, color: 0xff00ff, transparent: true, opacity: 0.8 });
            particles = new THREE.Points(geo, mat);
            scene.add(particles);

            // Crear el "Núcleo" (Esfera brillante central)
            const heartGeo = new THREE.SphereGeometry(0.8, 32, 32);
            const heartMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            heart = new THREE.Mesh(heartGeo, heartMat);
            scene.add(heart);

            // Control táctil
            document.addEventListener('touchmove', (e) => {
                mouseX = (e.touches[0].clientX - window.innerWidth/2) * 0.005;
                mouseY = (e.touches[0].clientY - window.innerHeight/2) * 0.005;
            });
            
            // Audio Logic
            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-button');
            btn.addEventListener('click', () => {
                if(audio.paused) { audio.play(); btn.innerHTML = "⏸"; }
                else { audio.pause(); btn.innerHTML = "▶"; }
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;
            
            // Suavizado de movimiento de cámara según el dedo
            camera.position.x += (mouseX - camera.position.x) * 0.05;
            camera.position.y += (-mouseY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
