<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Premium - Karimiel</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; filter: contrast(120%) brightness(110%); }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #header {
            margin-top: 30px; text-align: center; color: white;
            text-shadow: 0 0 20px rgba(255, 0, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.4);
        }

        #player {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 380px; background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px); border-radius: 25px; padding: 15px;
            display: flex; align-items: center; border: 1px solid rgba(255, 0, 255, 0.4);
            pointer-events: auto; box-shadow: 0 0 30px rgba(255, 0, 255, 0.2);
        }

        #play-btn {
            width: 55px; height: 55px; background: linear-gradient(45deg, #ff00ff, #8a2be2);
            border-radius: 50%; border: none; cursor: pointer; color: white;
            font-size: 22px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 15px #ff00ff;
        }

        .floating-text {
            position: absolute; color: rgba(255, 255, 255, 0.9); font-weight: bold;
            font-size: 14px; text-shadow: 0 0 10px rgba(255, 0, 255, 1);
            pointer-events: none; white-space: nowrap;
        }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="header">
        <h1 style="font-size: 1.2rem; letter-spacing: 3px;">TE AMO MUCHOTE MIS OJITOS BRILLANTES</h1>
        <p style="font-size: 0.8rem; color: #ff00ff;">¡MI KARIMIEL! ✨</p>
    </div>

    <div id="player">
        <button id="play-btn">▶</button>
        <div style="margin-left: 15px; color: white;">
            <div style="font-weight: bold; color: #ff00ff;">Reina Pepiada</div>
            <div style="font-size: 12px; opacity: 0.8;">Álvaro Díaz • 2026</div>
        </div>
    </div>
</div>

<audio id="musica" loop>
    <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
</audio>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- GEOMETRÍA DE LA GALAXIA (EFECTO PRO) ---
    const particlesCount = 15000;
    const posArray = new Float32Array(particlesCount * 3);
    const colorArray = new Float32Array(particlesCount * 3);

    for(let i=0; i < particlesCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 15;
        colorArray[i] = Math.random(); // Variación cromática
    }

    const particlesGeo = new THREE.BufferGeometry();
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    particlesGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

    const particlesMat = new THREE.PointsMaterial({
        size: 0.015,
        vertexColors: true,
        transparent: true,
        blending: THREE.AdditiveBlending,
        opacity: 0.8
    });

    const particlesMesh = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particlesMesh);

    // --- NÚCLEO CON GLOW ---
    const coreGeo = new THREE.SphereGeometry(0.5, 64, 64);
    const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const core = new THREE.Mesh(coreGeo, coreMat);
    scene.add(core);

    // Glow ambiental
    const light = new THREE.PointLight(0xff00ff, 10, 20);
    scene.add(light);

    // --- MENSAJES FLOTANTES ---
    const phrases = ["Mi Amor", "Mi Reina 👑", "Kari Miel", "Hermosa", "Única", "Mi Todo", "Te Amo", "Mi Vida", "Ojitos Brillantes", "Te Adoro"];
    const labels = [];
    const labelContainer = document.getElementById('ui-layer');

    phrases.forEach((txt) => {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.textContent = txt;
        labelContainer.appendChild(el);
        labels.push({
            element: el,
            pos: new THREE.Vector3((Math.random()-0.5)*8, (Math.random()-0.5)*8, (Math.random()-0.5)*8),
            speed: 0.002 + Math.random() * 0.005
        });
    });

    camera.position.z = 5;

    // --- INTERACCIÓN ---
    let mouseX = 0, mouseY = 0;
    document.addEventListener('touchmove', (e) => {
        mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 2;
        mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 2;
    });

    // --- AUDIO ---
    const audio = document.getElementById('musica');
    const btn = document.getElementById('play-btn');
    btn.onclick = () => {
        if(audio.paused) { audio.play(); btn.innerText = "⏸"; }
        else { audio.pause(); btn.innerText = "▶"; }
    };

    function animate() {
        requestAnimationFrame(animate);

        particlesMesh.rotation.y += 0.001;
        particlesMesh.rotation.x += mouseX * 0.02;
        
        camera.position.x += (mouseX * 2 - camera.position.x) * 0.05;
        camera.position.y += (-mouseY * 2 - camera.position.y) * 0.05;
        camera.lookAt(scene.position);

        labels.forEach(l => {
            l.pos.applyAxisAngle(new THREE.Vector3(0,1,0), l.speed);
            const v = l.pos.clone().project(camera);
            const x = (v.x + 1) * window.innerWidth / 2;
            const y = -(v.y - 1) * window.innerHeight / 2;
            
            l.element.style.left = `${x}px`;
            l.element.style.top = `${y}px`;
            l.element.style.opacity = v.z < 1 ? 1 : 0;
            l.element.style.transform = `scale(${1 - v.z*0.5})`;
        });

        renderer.render(scene, camera);
    }

    animate();
</script>
</body>
</html>
