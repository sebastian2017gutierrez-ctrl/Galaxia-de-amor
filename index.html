<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Karimiel Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #0b001a; overflow: hidden; font-family: 'Arial', sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        /* Encabezado estilo burbuja como en la imagen */
        #header-bubble {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px);
            padding: 10px 25px; border-radius: 50px; color: white;
            border: 1px solid rgba(255, 255, 255, 0.2); z-index: 10; text-align: center;
        }

        #player {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px); border-radius: 20px; padding: 15px;
            display: flex; align-items: center; border: 1px solid #ff00ff55; z-index: 100;
        }
        #play-btn {
            width: 45px; height: 45px; background: #ff00ff; border-radius: 50%;
            border: none; color: white; margin-right: 15px; cursor: pointer;
        }
        .msg {
            position: absolute; color: white; font-size: 11px; font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 255, 0.8); pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="header-bubble">
        <span style="font-size: 14px;">Te Amo Muchote Mis Ojitos Brillantes 🌟 ¡Mi Kari Miel! 💛</span>
    </div>

    <div id="player">
        <button id="play-btn">▶</button>
        <div style="color: white;">
            <b style="color: #ff00ff; font-size: 14px;">Reina Pepiada</b><br>
            <span style="font-size: 12px; opacity: 0.8;">Álvaro Díaz • 0:00 / 3:45 🎵</span>
        </div>
    </div>

    <audio id="musica" loop src="Álvaro Díaz - Reina Pepiada - AMV.mp3"></audio>

    <div id="labels"></div>

    <script>
        let scene, camera, renderer, galaxy, core;
        let phrases = ["Mi Amor", "Mi Reina 👑", "Kari Miel", "Hermosa", "Única", "Mi Todo", "Te Amo", "Mi Vida", "Ojitos Brillantes", "Te Adoro", "Mi Luz", "Mundo", "Eterna", "Mi Niña"];
        let labels = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            // Niebla morada para dar la atmósfera de la imagen original
            scene.fog = new THREE.FogExp2(0x0b001a, 0.08);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 10);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // --- CREACIÓN DEL DISCO DE LA GALAXIA ---
            const starGeo = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            for(let i=0; i<10000; i++) {
                let angle = Math.random() * Math.PI * 2;
                let radius = Math.random() * 8 + 0.5;
                // Esto hace que sea plano (Y cerca de 0) como en la imagen
                let y = (Math.random() - 0.5) * 0.5; 
                positions.push(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
                colors.push(1, 1, 1);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            let starMat = new THREE.PointsMaterial({ size: 0.03, transparent: true, opacity: 0.8 });
            galaxy = new THREE.Points(starGeo, starMat);
            scene.add(galaxy);

            // --- NÚCLEO OSCURO (Como en la imagen 2) ---
            core = new THREE.Mesh(
                new THREE.SphereGeometry(1.2, 32, 32),
                new THREE.MeshBasicMaterial({ color: 0x000000 })
            );
            scene.add(core);

            // Brillo central púrpura
            let light = new THREE.PointLight(0xff00ff, 5, 15);
            scene.add(light);

            // --- MENSAJES ORBITANDO ---
            const container = document.getElementById('labels');
            for(let i=0; i<50; i++) {
                let div = document.createElement('div');
                div.className = 'msg';
                div.textContent = phrases[Math.floor(Math.random()*phrases.length)];
                container.appendChild(div);
                labels.push({
                    el: div,
                    pos: new THREE.Vector3((Math.random()-0.5)*12, (Math.random()-0.5)*2, (Math.random()-0.5)*12),
                    speed: 0.001 + Math.random() * 0.003
                });
            }

            // Controles Música
            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-btn');
            btn.onclick = () => {
                if(audio.paused) { audio.play(); btn.innerText = "⏸"; }
                else { audio.pause(); btn.innerText = "▶"; }
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            galaxy.rotation.y += 0.001;
            
            labels.forEach(l => {
                l.pos.applyAxisAngle(new THREE.Vector3(0,1,0), l.speed);
                let v = l.pos.clone().project(camera);
                l.el.style.left = (v.x + 1) * window.innerWidth / 2 + 'px';
                l.el.style.top = -(v.y - 1) * window.innerHeight / 2 + 'px';
                l.el.style.display = v.z < 1 ? 'block' : 'none';
                l.el.style.opacity = 1 - (v.z);
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
  </html>
