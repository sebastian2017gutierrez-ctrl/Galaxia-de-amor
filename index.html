<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxia Karimiel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; touch-action: none; }
        #header {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #fff; text-shadow: 0 0 10px #ff00ff; z-index: 10; pointer-events: none;
        }
        #player {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 350px; background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px); border-radius: 20px; padding: 10px 15px;
            display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100; color: white;
        }
        #play-btn {
            width: 40px; height: 40px; background: #fff; border-radius: 50%;
            border: none; margin-right: 12px; cursor: pointer; color: #000;
        }
        .orbit-text {
            position: absolute; color: rgba(255, 255, 255, 0.9);
            font-size: 11px; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
        }
    </style>
</head>
<body>

    <div id="header">
        <h2 style="font-size: 18px;">TE AMO MUCHOTE MIS OJITOS BRILLANTES ¡MI KARIMIEL! 🌟💛</h2>
        <p style="font-size: 11px; opacity: 0.7;">Mueve la galaxia con tu dedo</p>
    </div>

    <div id="player">
        <button id="play-btn">▶</button>
        <div style="font-size: 12px;">
            <b style="color: #ff00ff; display: block;">Reina Pepiada - Álvaro Díaz</b>
            <span>0:00 / 3:45 🎵</span>
        </div>
    </div>

    <audio id="musica" loop>
        <source src="Álvaro Díaz - Reina Pepiada - AMV.mp3" type="audio/mpeg">
    </audio>

    <div id="labels"></div>

    <script>
        let scene, camera, renderer, starGeo, stars, core;
        let texts = [];
        const phrases = ["Mi Amor", "Mi Reina 👑", "Hermosa", "Única", "Mi Todo", "Kari Miel", "Mi Cielito", "Te Amo", "Mi Vida", "Ojitos Brillantes", "Tesoro"];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 1000);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Estrellas / Partículas
            starGeo = new THREE.BufferGeometry();
            let positions = [];
            for(let i=0; i<5000; i++) {
                positions.push(Math.random()*600-300, Math.random()*600-300, Math.random()*600-300);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            let starMaterial = new THREE.PointsMaterial({ color: 0xaaaaaa, size: 0.7 });
            stars = new THREE.Points(starGeo, starMaterial);
            scene.add(stars);

            // EL NÚCLEO PÚRPURA (Igual a tu imagen)
            let coreGeo = new THREE.SphereGeometry(2, 32, 32);
            let coreMat = new THREE.MeshBasicMaterial({ 
                color: 0x660099, // Púrpura base
                transparent: true,
                opacity: 0.9
            });
            core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);

            // Luz para que brille el centro
            let light = new THREE.PointLight(0xff00ff, 2, 50);
            scene.add(light);

            // Crear mensajes
            const labelContainer = document.getElementById('labels');
            for(let i=0; i<40; i++) {
                let div = document.createElement('div');
                div.className = 'orbit-text';
                div.textContent = phrases[Math.floor(Math.random()*phrases.length)];
                labelContainer.appendChild(div);
                texts.push({
                    element: div,
                    pos: new THREE.Vector3(Math.random()*10-5, Math.random()*10-5, Math.random()*10-5),
                    speed: Math.random() * 0.01
                });
            }

            // Controles
            document.addEventListener('touchmove', (e) => {
                let x = e.touches[0].clientX / window.innerWidth - 0.5;
                let y = e.touches[0].clientY / window.innerHeight - 0.5;
                stars.rotation.y = x * 2;
                stars.rotation.x = y * 2;
            });

            // Música
            const audio = document.getElementById('musica');
            const btn = document.getElementById('play-btn');
            btn.onclick = () => {
                if(audio.paused) { audio.play(); btn.innerText = "⏸"; }
                else { audio.pause(); btn.innerText = "▶"; }
            };
        }

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.001;
            
            // Animación de textos
            texts.forEach(t => {
                t.pos.applyAxisAngle(new THREE.Vector3(0,1,0), 0.005);
                let v = t.pos.clone().project(camera);
                let x = (v.x + 1) * window.innerWidth / 2;
                let y = -(v.y - 1) * window.innerHeight / 2;
                t.element.style.left = x + 'px';
                t.element.style.top = y + 'px';
                t.element.style.display = v.z < 1 ? 'block' : 'none';
            });

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
